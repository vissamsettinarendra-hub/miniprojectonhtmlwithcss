<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shopping Cart</title>
<link rel="stylesheet" href="shoppingmall.css">
</head>
<body>

<header>
    <h1>🛒 Smart Shopping Cart</h1>
    <script src="shoppingmall.js"></script>
</header>

<section>

    <input type="text" id="search" placeholder="Search Product">

    <select id="category">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Stationery">Stationery</option>
        <option value="Accessories">Accessories</option>
    </select>

</section>

<h2>Products</h2>

<div id="products"></div>

<hr>

<h2>Shopping Cart</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>
</tr>

</thead>

<tbody id="cartBody"></tbody>

</table>

<h3>Total Items :
<span id="items">0</span>
</h3>

<h3>Total Price :
₹<span id="price">0</span>
</h3>

<hr>

<h2>Checkout</h2>

<input type="text" id="customer" placeholder="Customer Name">

<input type="text" id="coupon" placeholder="Coupon">

<button onclick="applyCoupon()">Apply Coupon</button>

<p id="couponMsg"></p>

<button onclick="checkout()">Checkout</button>

<div id="invoice"></div>

<script src="script.js"></script>

</body>
</html>
